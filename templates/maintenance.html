{% extends "base.html" %}
{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px">
  <h1 style="margin:0;color:var(--accent)">Maintenance Mode</h1>
  <p class="post-meta">The site is temporarily under maintenance. We'll be back shortly.</p>
  {% if current_user and current_user.is_admin %}
    <p><a href="{{ url_for('admin_settings') }}" class="btn" style="background:var(--accent);color:#fff">Open Settings</a></p>
  {% endif %}
</div>
{% endblock %}
