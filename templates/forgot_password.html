{% extends "base.html" %}
{% block content %}
<div class="card auth-card">
  <h1>{{ t.app_name }}</h1>
  <p style="text-align:center;color:var(--gray)">{{ t.password_reset_sent }}</p>
  <form method="POST" action="{{ url_for('forgot_password') }}">
    <label>{{ t.email }}</label>
    <input type="email" name="email" required>
    <button type="submit" class="btn btn-full">{{ t.password_reset_sent }}</button>
  </form>
  <p class="switch-link">
    <a href="{{ url_for('login') }}"><b>{{ t.login }}</b></a>
  </p>
</div>
{% endblock %}
