{% extends "base.html" %}
{% block content %}
{% include "admin_nav.html" %}

<div class="card">
  <h2 style="margin:0 0 6px">⚙️ Admin Quick Settings</h2>
  <p class="post-meta" style="margin:0">Make quick changes to maintenance mode and dynamic pricing.</p>
</div>

<div class="card">
  <form method="POST" action="{{ url_for('admin_settings') }}" style="display:flex;flex-direction:column;gap:12px">
    <label style="display:flex;align-items:center;gap:12px">
      <input type="checkbox" name="maintenance_mode" value="1" {% if maintenance_mode %}checked{% endif %}>
      <span>Maintenance Mode</span>
    </label>

    <label>Blue Tick (verification) price</label>
    <input type="number" step="1" min="0" name="verification_price" value="{{ verification_price }}">

    <label>VIP monthly price</label>
    <input type="number" step="1" min="0" name="vip_price" value="{{ vip_price }}">

    <label>Extra product post fee</label>
    <input type="number" step="0.01" min="0" name="extra_product_fee" value="{{ extra_product_fee }}">

    <fieldset style="border:1px solid rgba(79,143,255,0.18);padding:14px;border-radius:14px;">
      <legend style="padding:0 8px;color:var(--accent);font-weight:700;">Social Auth Links</legend>
      <label style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" name="social_auth_enabled" value="1" {% if social_auth_on %}checked{% endif %}>
        <span>Enable social auth buttons</span>
      </label>
      <label>Google URL</label>
      <input type="text" name="social_google_url" value="{{ social_google_url }}" placeholder="https://accounts.google.com/...">
      <label>Telegram URL</label>
      <input type="text" name="social_telegram_url" value="{{ social_telegram_url }}" placeholder="https://t.me/yourbot">
      <label>Discord URL</label>
      <input type="text" name="social_discord_url" value="{{ social_discord_url }}" placeholder="https://discord.gg/yourserver">
    </fieldset>

    <div>
      <button type="submit" class="btn" style="background:var(--accent);color:white">Save Settings</button>
    </div>
  </form>
</div>

{% endblock %}
