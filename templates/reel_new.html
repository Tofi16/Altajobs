{% extends "base.html" %}
{% block content %}

<a href="{{ url_for('reels_feed') }}" class="btn btn-outline btn-small">← {{ t.back }}</a>

<div class="card" style="margin-top:14px">
  <h2><i class='bx bxs-video-plus'></i> {{ t.post_a_reel }}</h2>
  <form method="POST" enctype="multipart/form-data">
    <label>{{ t.upload_video }}</label>
    <input type="file" name="video" accept="video/mp4,video/webm,video/quicktime" required
           onchange="const f=this.files[0]; if(f){ document.getElementById('videoPreview').src=URL.createObjectURL(f); document.getElementById('previewWrap').style.display='block'; }">

    <div id="previewWrap" style="display:none;margin-bottom:12px">
      <video id="videoPreview" controls style="width:100%;max-height:320px;border-radius:10px;background:#000"></video>
    </div>

    <label>{{ t.description_label }}</label>
    <textarea name="content" placeholder="{{ t.reel_caption_placeholder }}"></textarea>

    <label>{{ t.mention_label }}</label>
    <input type="text" name="mentions" placeholder="{{ t.mention_placeholder }}">

    <button type="submit" class="btn btn-full btn-gold">{{ t.post_button }}</button>
  </form>
</div>

{% endblock %}
