{% extends "base.html" %}
{% block content %}
<style>
  .aj-input {
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 12px 14px;
    width: 100%;
    box-sizing: border-box;
    font-size: 15px;
    transition: border-color .18s ease, box-shadow .18s ease;
    outline: none;
  }
  .aj-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(29, 155, 240, 0.18);
  }
  .aj-password-wrap { position: relative; }
  .aj-password-wrap .aj-input { padding-right: 42px; }
  .aj-eye-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 4px;
  }
</style>

<div class="card auth-card">
  <h1>{{ t.app_name }}</h1>
  <p style="text-align:center;color:var(--gray)">{{ t.create_account }}</p>

  <form method="POST" id="registerForm">
    <input type="hidden" name="ref_code" value="{{ ref_code }}">

    <label>{{ t.username }}</label>
    <input class="aj-input" type="text" name="username" required>

    <label style="margin-top:10px;display:block;">{{ t.password }}</label>
    <div class="aj-password-wrap">
      <input class="aj-input" type="password" name="password" id="passwordField" required>
      <button type="button" class="aj-eye-toggle" onclick="aj_togglePassword()">👁️</button>
    </div>

    <button type="submit" class="btn btn-full">{{ t.create_account }}</button>
  </form>

  <p class="switch-link">
    {{ t.already_have_account }} <a href="{{ url_for('login') }}"><b>{{ t.login }}</b></a>
  </p>
  <p class="switch-link">
    <a href="{{ url_for('set_language_route', lang='en') }}">English</a> ·
    <a href="{{ url_for('set_language_route', lang='am') }}">አማርኛ</a>
  </p>
</div>

<script>
  function aj_selectType(type) {
    document.getElementById('user_type_input').value = type;
    document.querySelectorAll('.aj-type-card').forEach(function (card) {
      if (card.dataset.type === type) {
        card.classList.add('selected');
        card.classList.remove('dimmed');
      } else {
        card.classList.remove('selected');
        card.classList.add('dimmed');
      }
    });
  }
  function aj_togglePassword() {
    var field = document.getElementById('passwordField');
    field.type = field.type === 'password' ? 'text' : 'password';
  }
</script>
{% endblock %}
