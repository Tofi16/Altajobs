{% extends "base.html" %}
{% block content %}
<div class="card auth-card">
  <h1>{{ t.app_name }}</h1>
  <p style="text-align:center;color:var(--gray)">{{ t.password_reset_success }}</p>
  <form method="POST" action="{{ url_for('reset_password') }}">
    <label>{{ t.email }}</label>
    <input type="email" name="email" required>
    <label>{{ t.password }}</label>
    <input type="text" name="reset_code" required>
    <label>{{ t.password }}</label>
    <input type="password" name="new_password" required>
    <button type="submit" class="btn btn-full">{{ t.password_reset_success }}</button>
  </form>
</div>
{% endblock %}
